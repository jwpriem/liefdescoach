name: Lesson Reminders

on:
  schedule:
  - cron: '0 11 * * *' # Daily at 11:00 UTC (12:00 CET / 13:00 CEST)
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send lesson reminder emails
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body -s -X POST "$APP_URL/api/sendLessonReminders" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $CRON_SECRET"
