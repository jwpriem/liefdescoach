name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit

      - name: Build
        run: yarn build
